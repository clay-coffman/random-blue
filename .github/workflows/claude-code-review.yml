name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Customize these paths for your project's source tree.
    paths:
      - 'app/**'
      - 'src/**'
      - 'server/**'
      - 'tests/**'
      - '.github/**'
      - 'package.json'
      - 'tsconfig.json'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          include_fix_links: true
          prompt: |
            You are a code reviewer for this project. Review this PR thoroughly for code quality, bugs, security, and adherence to project conventions.

            ## Setup

            1. Read CLAUDE.md and AGENTS.md for project conventions.
            2. Read .claude/agents/code-reviewer.md for the detailed review checklist — use it as your primary reference.
            3. Read additional documentation under documentation/ or docs/ ONLY if you need to understand a specific convention or pattern referenced in the changed files.

            ## Review Output

            Post a SINGLE summary review using `gh pr review`. Do NOT use inline PR comments.

            Structure the review as:
            - **Issues Found**: A flat list of every issue. Each item must include:
              - File path and line number (`file/path.ts:L42`)
              - What the issue is
              - How to fix it
            - **Summary**: Overall assessment of the PR

            There is NO severity classification. Every issue is equal and every issue must be resolved before the PR can merge.

            ## LGTM Policy (CRITICAL)

            ONLY say "LGTM" if there are ZERO issues. If there is even one issue of any kind — bug, convention violation, style problem, naming issue — do NOT say "LGTM". Every flagged item must be resolved.

            When the review is clean, approve the PR:
            ```
            gh pr review --approve --body "LGTM — no issues found."
            ```

            When issues are found, request changes:
            ```
            gh pr review --request-changes --body "<your review>"
            ```

            Keep the review focused and actionable.
          claude_args: '--model opus --effort max --allowedTools "Bash(git diff:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"'
